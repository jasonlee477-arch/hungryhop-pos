<!DOCTYPE html>
<html>

<head>

<title>Hungry Hop Kitchen</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

/* WORKFLOW BOARD */

.workflow{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.column{
background:#eee;
padding:10px;
border-radius:10px;
min-height:400px;
}

.column h2{
text-align:center;
margin-bottom:10px;
}

/* ORDER CARD */

.order{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.order h3{
margin-top:0;
color:#e31837;
}

.order ul{
padding-left:20px;
}

.timer{
margin-top:8px;
font-weight:bold;
color:#333;
}

.order button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#e31837;
color:white;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🍔 Hungry Hop Kitchen Workflow</h1>

<audio id="orderSound">
<source src="/notification.mp3" type="audio/mpeg">
</audio>

<div class="workflow">

<div class="column">
<h2>Pending</h2>
<div id="pending"></div>
</div>

<div class="column">
<h2>Preparing</h2>
<div id="preparing"></div>
</div>

<div class="column">
<h2>Ready</h2>
<div id="ready"></div>
</div>

<div class="column">
<h2>Completed</h2>
<div id="completed"></div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

/* SOCKET EVENTS */

socket.on("new-order",()=>{

document.getElementById("orderSound").play()

loadOrders()

})

socket.on("order-updated",()=>{

loadOrders()

})

/* UPDATE ORDER STATUS */

async function updateStatus(id,status){

await fetch("/order/"+id+"/status",{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({status})

})

}

/* LOAD ORDERS */

async function loadOrders(){

const res = await fetch("/orders")

const orders = await res.json()

document.getElementById("pending").innerHTML=""
document.getElementById("preparing").innerHTML=""
document.getElementById("ready").innerHTML=""
document.getElementById("completed").innerHTML=""

orders.forEach(order=>{

let itemsHTML=""

order.items.forEach(item=>{
itemsHTML+=`<li>${item.name} x ${item.qty}</li>`
})

let buttonHTML=""

if(order.status==="Pending"){
buttonHTML=`<button onclick="updateStatus('${order._id}','Preparing')">Start</button>`
}

if(order.status==="Preparing"){
buttonHTML=`<button onclick="updateStatus('${order._id}','Ready')">Ready</button>`
}

if(order.status==="Ready"){
buttonHTML=`<button onclick="updateStatus('${order._id}','Completed')">Complete</button>`
}

const orderHTML=`

<div class="order">

<h3>Order #${order.orderNumber}</h3>

<ul>
${itemsHTML}
</ul>

<p class="timer" data-time="${order.createdAt}">
00:00
</p>

${buttonHTML}

</div>

`

const column=document.getElementById(order.status.toLowerCase())

if(column){
column.innerHTML+=orderHTML
}

})

startTimers()

}

/* TIMER SYSTEM */

let timerInterval

function startTimers(){

clearInterval(timerInterval)

timerInterval=setInterval(()=>{

const timers=document.querySelectorAll(".timer")

timers.forEach(timer=>{

const created=new Date(timer.dataset.time)

const now=new Date()

const seconds=Math.floor((now-created)/1000)

const minutes=Math.floor(seconds/60)
const remaining=seconds%60

const formatted =
String(minutes).padStart(2,"0") +
":" +
String(remaining).padStart(2,"0")

timer.innerText=formatted

})

},1000)

}

/* INITIAL LOAD */

loadOrders()

</script>

</body>

</html>
